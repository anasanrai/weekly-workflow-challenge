<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0A0A0B;
      --surface:    #111113;
      --surface2:   #18181B;
      --border:     rgba(255,255,255,0.06);
      --accent:     #00D4AA;
      --accent-dim: rgba(0,212,170,0.12);
      --accent-glow:rgba(0,212,170,0.25);
      --text:       #FFFFFF;
      --text-2:     #A1A1AA;
      --text-3:     #52525B;
      --red:        #F87171;
      --red-dim:    rgba(248,113,113,0.12);
      --yellow:     #FBBF24;
      --yellow-dim: rgba(251,191,36,0.12);
      --blue:       #60A5FA;
      --blue-dim:   rgba(96,165,250,0.12);
      --green:      #4ADE80;
      --green-dim:  rgba(74,222,128,0.12);
      --purple:     #A78BFA;
      --purple-dim: rgba(167,139,250,0.12);
      --radius:     14px;
      --radius-sm:  8px;
    }

    html { font-size: 15px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 99px; }

    /* ── Layout ── */
    .shell { max-width: 1400px; margin: 0 auto; padding: 28px 24px 48px; }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px; flex-wrap: wrap; gap: 12px;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo {
      width: 36px; height: 36px; background: var(--accent);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 20px var(--accent-glow); flex-shrink: 0;
    }
    .logo svg { width: 18px; height: 18px; }
    .header-title { font-size: 1.15rem; font-weight: 600; letter-spacing: -0.02em; }
    .header-sub { font-size: 0.78rem; color: var(--text-2); margin-top: 1px; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .refresh-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-2); border-radius: var(--radius-sm);
      padding: 7px 13px; font-size: 0.78rem; cursor: pointer;
      transition: all .2s; font-family: inherit;
    }
    .refresh-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.12); }
    .refresh-btn.spinning svg { animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .live-badge { display: flex; align-items: center; gap: 5px; font-size: 0.73rem; color: var(--text-2); padding: 6px 10px; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .refresh-timer { font-size: 0.68rem; color: var(--text-3); }

    /* ── Grid ── */
    .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 18px; }
    .col-3  { grid-column: span 3; }
    .col-4  { grid-column: span 4; }
    .col-5  { grid-column: span 5; }
    .col-12 { grid-column: span 12; }
    @media (max-width: 1100px) {
      .col-3, .col-4, .col-5 { grid-column: span 6; }
    }
    @media (max-width: 700px) {
      .col-3, .col-4, .col-5, .col-12 { grid-column: span 12; }
    }

    /* ── Card ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 22px;
      position: relative; overflow: hidden; transition: border-color .2s;
    }
    .card:hover { border-color: rgba(255,255,255,0.1); }
    .card::before {
      content:''; position: absolute; inset: 0; border-radius: var(--radius);
      background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,212,170,0.03), transparent);
      pointer-events: none;
    }

    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .card-title-row { display: flex; align-items: center; gap: 9px; }
    .card-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .card-title { font-size: 0.85rem; font-weight: 600; letter-spacing: -0.01em; }
    .card-count { font-size: 0.7rem; font-weight: 500; padding: 2px 7px; border-radius: 99px; background: var(--surface2); color: var(--text-2); }

    /* ── Skeleton ── */
    .skeleton { animation: shimmer 1.4s ease-in-out infinite; }
    @keyframes shimmer { 0%,100%{opacity:.4} 50%{opacity:.8} }
    .skel-line { height: 11px; border-radius: 6px; background: var(--surface2); margin-bottom: 10px; }

    /* ── Empty ── */
    .empty { text-align: center; padding: 28px 0; color: var(--text-3); font-size: 0.8rem; }

    /* ── Weather ── */
    .weather-card {
      background: linear-gradient(135deg, #0D1F1A 0%, #0A0A0B 100%);
      border-color: rgba(0,212,170,0.15);
    }
    .weather-main { display: flex; align-items: flex-end; gap: 16px; margin-bottom: 18px; }
    .weather-temp {
      font-size: 3.4rem; font-weight: 300; line-height: 1; letter-spacing: -0.04em;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .weather-condition { font-size: 0.9rem; font-weight: 500; margin-bottom: 3px; }
    .weather-location { font-size: 0.75rem; color: var(--text-2); }
    .weather-meta {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
      padding-top: 16px; border-top: 1px solid var(--border);
    }
    .weather-meta-item { text-align: center; }
    .weather-meta-label { font-size: 0.68rem; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
    .weather-meta-value { font-size: 0.85rem; font-weight: 500; }
    .weather-icon-big { font-size: 3rem; line-height: 1; }

    /* ── Events ── */
    .event-list { display: flex; flex-direction: column; gap: 10px; }
    .event-item {
      display: flex; gap: 12px; padding: 12px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); cursor: default;
    }
    .event-accent-bar { width: 3px; border-radius: 99px; flex-shrink: 0; align-self: stretch; }
    .event-body { flex: 1; min-width: 0; }
    .event-title { font-size: 0.82rem; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .event-time { font-size: 0.72rem; color: var(--text-2); margin-top: 3px; }
    .event-desc { font-size: 0.72rem; color: var(--text-3); margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .event-status-badge { font-size: 0.65rem; font-weight: 500; padding: 2px 7px; border-radius: 4px; align-self: flex-start; flex-shrink: 0; }

    /* ── Stats ── */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
    @media (max-width: 700px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
    .stat-box { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px 14px; }
    .stat-label { font-size: 0.68rem; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    .stat-value { font-size: 1.6rem; font-weight: 600; letter-spacing: -0.03em; line-height: 1; }

    /* ── Priority bar ── */
    .priority-bar { display: flex; height: 5px; border-radius: 99px; overflow: hidden; gap: 2px; margin: 14px 0 16px; }
    .priority-bar-seg { border-radius: 99px; transition: width .5s ease; }

    /* ── Filter tabs ── */
    .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-tab {
      font-size: 0.72rem; font-weight: 500; padding: 4px 10px; border-radius: 99px;
      border: 1px solid var(--border); background: transparent; color: var(--text-2);
      cursor: pointer; transition: all .15s; font-family: inherit;
    }
    .filter-tab:hover { border-color: rgba(255,255,255,.15); color: var(--text); }
    .filter-tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    /* ── Tasks ── */
    .task-list { display: flex; flex-direction: column; gap: 8px; }
    .task-item {
      display: flex; align-items: flex-start; gap: 11px; padding: 11px 13px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); cursor: default;
    }
    .task-check {
      width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px;
      border-radius: 4px; border: 1.5px solid var(--text-3);
      display: flex; align-items: center; justify-content: center;
    }
    .task-check.done { background: var(--accent); border-color: var(--accent); }
    .task-body { flex: 1; min-width: 0; }
    .task-name { font-size: 0.82rem; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .task-name a { color: inherit; text-decoration: none; }
    .task-name a:hover { text-decoration: underline; }
    .task-name.strikethrough { text-decoration: line-through; color: var(--text-3); }
    .task-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
    .task-due { font-size: 0.7rem; color: var(--text-2); }
    .task-due.overdue { color: var(--red); }
    .task-list-tag { font-size: 0.68rem; color: var(--text-3); }

    /* ── Badge ── */
    .badge { display: inline-flex; align-items: center; font-size: 0.65rem; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; }
    .p-urgent  { background: var(--red-dim);    color: var(--red); }
    .p-high    { background: var(--yellow-dim); color: var(--yellow); }
    .p-normal  { background: var(--blue-dim);   color: var(--blue); }
    .p-low     { background: var(--surface2);   color: var(--text-3); }
    .s-done    { background: var(--green-dim);  color: var(--green); }
    .s-progress{ background: var(--accent-dim); color: var(--accent); }
    .s-todo    { background: var(--surface2);   color: var(--text-2); }
    .cat-finance  { background: var(--green-dim);  color: var(--green); }
    .cat-highpri  { background: var(--red-dim);    color: var(--red); }
    .cat-updates  { background: var(--blue-dim);   color: var(--blue); }
    .cat-other    { background: var(--surface2);   color: var(--text-3); }

    /* ── Emails ── */
    .email-group-label {
      font-size: 0.68rem; text-transform: uppercase; letter-spacing: .08em;
      color: var(--text-3); font-weight: 600; margin: 14px 0 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .email-group-label .line { flex: 1; height: 1px; background: var(--border); }
    .email-list { display: flex; flex-direction: column; gap: 6px; }
    .email-item {
      display: flex; align-items: flex-start; gap: 11px; padding: 11px 13px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); cursor: default;
    }
    .email-item.unread { border-left: 2px solid var(--accent); }
    .email-avatar {
      width: 30px; height: 30px; border-radius: 8px; background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 600; flex-shrink: 0; color: var(--accent);
      border: 1px solid var(--border);
    }
    .email-body { flex: 1; min-width: 0; }
    .email-from-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .email-from { font-size: 0.8rem; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .email-date { font-size: 0.68rem; color: var(--text-3); flex-shrink: 0; }
    .email-subject { font-size: 0.75rem; color: var(--text-2); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .email-snippet { font-size: 0.7rem; color: var(--text-3); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .email-labels { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
    .email-label { font-size: 0.63rem; font-weight: 500; padding: 1px 5px; border-radius: 3px; background: var(--surface); border: 1px solid var(--border); color: var(--text-3); }

    /* ── Email grid ── */
    .email-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 0 24px; }

    /* ── Scroll ── */
    .scroll-area { overflow-y: auto; max-height: 440px; padding-right: 4px; }

    /* ── Error ── */
    .error-banner {
      background: var(--red-dim); border: 1px solid rgba(248,113,113,.2);
      color: var(--red); border-radius: var(--radius-sm);
      padding: 10px 14px; font-size: 0.78rem; margin-bottom: 18px; display: none;
    }
    .error-banner.show { display: block; }
  </style>
</head>

// ── Safe escaping (XSS prevention) ────────────────────────────────────────
function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// Only allow http/https URLs to prevent javascript: injection
function safeUrl(url) {
  if (!url) return null;
  try {
    const u = new URL(url);
    if (u.protocol === 'http:' || u.protocol === 'https:') return url;
  } catch (_) {}
  return null;
}

// ── Helpers ────────────────────────────────────────────────────────────────
function fmt(d) {
  if (!d) return '–';
  return new Date(d).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString([], { month: 'short', day: 'numeric' });
}
function fmtDateTime(d) {
  if (!d) return '';
  return new Date(d).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}
function initials(name) {
  if (!name) return '?';
  return name.trim().split(/\s+/).slice(0, 2).map(w => w[0]).join('').toUpperCase();
}
function isOverdue(dateStr) {
  return dateStr ? new Date(dateStr) < new Date() : false;
}

function priorityCls(p) {
  const m = { urgent:'p-urgent', high:'p-high', normal:'p-normal', low:'p-low' };
  return m[(p||'normal').toLowerCase()] || 'p-normal';
}
function statusCls(s) {
  const v = (s||'').toLowerCase();
  if (/done|complete/.test(v)) return 's-done';
  if (/progress|active/.test(v)) return 's-progress';
  return 's-todo';
}
function categoryCls(c) {
  const m = { 'finance':'cat-finance', 'high priority':'cat-highpri', 'updates':'cat-updates' };
  return m[(c||'').toLowerCase()] || 'cat-other';
}
function eventColor(s) {
  const m = { confirmed:'var(--accent)', tentative:'var(--yellow)', cancelled:'var(--red)', scheduled:'var(--blue)' };
  return m[(s||'').toLowerCase()] || 'var(--purple)';
}
function eventBg(s) {
  const m = { confirmed:'var(--accent-dim)', tentative:'var(--yellow-dim)', cancelled:'var(--red-dim)', scheduled:'var(--blue-dim)' };
  return m[(s||'').toLowerCase()] || 'var(--purple-dim)';
}

// ── DOM helpers (safe, no innerHTML for user content) ─────────────────────
function el(tag, props = {}, ...children) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (k === 'class') node.className = v;
    else if (k === 'style') node.style.cssText = v;
    else if (k === 'href') node.href = v;
    else if (k === 'target') node.target = v;
    else if (k === 'rel') node.rel = v;
    else node.setAttribute(k, v);
  }
  for (const child of children) {
    if (child == null) continue;
    if (typeof child === 'string') node.appendChild(document.createTextNode(child));
    else node.appendChild(child);
  }
  return node;
}

function txt(content) { return document.createTextNode(String(content ?? '')); }

// ── Fetch ──────────────────────────────────────────────────────────────────
async function fetchAll() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');

  try {
    const [t, e, c] = await Promise.all([
      sb.from('dashboard_tasks').select('*').order('priority'),
      sb.from('dashboard_emails').select('*').order('date', { ascending: false }),
      sb.from('dashboard_calendar').select('*').order('start_time'),
    ]);

    if (t.error) throw new Error('Tasks: ' + t.error.message);
    if (e.error) throw new Error('Emails: ' + e.error.message);
    if (c.error) throw new Error('Calendar: ' + c.error.message);

    allTasks  = t.data || [];
    allEmails = e.data || [];
    allEvents = c.data || [];

    renderTasks(allTasks);
    renderEmails(allEmails);
    renderCalendar(allEvents);

    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    nextRefreshTime = Date.now() + 300_000;

  } catch (err) {
    showError(err.message);
  } finally {
    btn.classList.remove('spinning');
  }
}

// ── Error banner ───────────────────────────────────────────────────────────
function showError(msg) {
  const banner = document.getElementById('error-banner');
  banner.textContent = '⚠ ' + msg;
  banner.classList.add('show');
  setTimeout(() => banner.classList.remove('show'), 8000);
}

// ── Render: Calendar ──────────────────────────────────────────────────────
function renderCalendar(events) {
  document.getElementById('cal-count').textContent = events.length;
  const list = document.getElementById('event-list');
  list.innerHTML = '';

  if (!events.length) {
    const empty = el('div', { class: 'empty' }, 'No events today');
    list.appendChild(empty);
    return;
  }

  for (const ev of events) {
    const color = eventColor(ev.status);
    const bg    = eventBg(ev.status);
    const timeStr = ev.start_time && ev.end_time
      ? fmt(ev.start_time) + ' – ' + fmt(ev.end_time)
      : ev.start_time ? fmt(ev.start_time) : 'All day';

    const item = el('div', { class: 'event-item' },
      el('div', { class: 'event-accent-bar', style: 'background:' + color }),
      el('div', { class: 'event-body' },
        el('div', { class: 'event-title' }, ev.title || 'Untitled'),
        el('div', { class: 'event-time' }, timeStr),
        ev.description ? el('div', { class: 'event-desc' }, ev.description) : null
      ),
      ev.status
        ? el('div', {
            class: 'event-status-badge',
            style: 'background:' + bg + ';color:' + color
          }, ev.status)
        : null
    );
    list.appendChild(item);
  }
}

// ── Render: Tasks ─────────────────────────────────────────────────────────
function renderTasks(tasks) {
  const filtered = currentFilter === 'all'
    ? tasks
    : tasks.filter(t => (t.priority || '').toLowerCase() === currentFilter);

  // Stats
  document.getElementById('s-total').textContent    = tasks.length;
  document.getElementById('s-urgent').textContent   = tasks.filter(t => /urgent/i.test(t.priority || '')).length;
  document.getElementById('s-progress').textContent = tasks.filter(t => /progress|active/i.test(t.status || '')).length;
  document.getElementById('s-done').textContent     = tasks.filter(t => /done|complete/i.test(t.status || '')).length;

  // Priority bar
  const total = tasks.length || 1;
  const pu = tasks.filter(t => /urgent/i.test(t.priority || '')).length;
  const ph = tasks.filter(t => /^high$/i.test(t.priority || '')).length;
  const pn = tasks.filter(t => /^normal$/i.test(t.priority || '')).length;
  const pl = total - pu - ph - pn;
  const bar = document.getElementById('priority-bar');
  bar.innerHTML = '';
  [
    [pu, 'var(--red)'], [ph, 'var(--yellow)'],
    [pn, 'var(--blue)'], [pl, 'var(--text-3)']
  ].forEach(([count, color]) => {
    const seg = document.createElement('div');
    seg.className = 'priority-bar-seg';
    seg.style.cssText = `width:${(count/total)*100}%;background:${color}`;
    bar.appendChild(seg);
  });

  const list = document.getElementById('task-list');
  list.innerHTML = '';

  if (!filtered.length) {
    list.appendChild(el('div', { class: 'empty' }, 'No tasks found'));
    return;
  }

  for (const t of filtered) {
    const done = /done|complete/i.test(t.status || '');
    const checkDiv = el('div', { class: 'task-check' + (done ? ' done' : '') });
    if (done) {
      // Safe inline SVG for checkmark via DOM
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('width', '10'); svg.setAttribute('height', '10'); svg.setAttribute('viewBox', '0 0 10 10');
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', 'M2 5l2.5 2.5L8 3');
      path.setAttribute('stroke', '#0A0A0B'); path.setAttribute('stroke-width', '1.5');
      path.setAttribute('stroke-linecap', 'round'); path.setAttribute('stroke-linejoin', 'round');
      path.setAttribute('fill', 'none');
      svg.appendChild(path);
      checkDiv.appendChild(svg);
    }

    let nameContent;
    const url = safeUrl(t.url);
    if (url) {
      nameContent = el('a', { href: url, target: '_blank', rel: 'noopener noreferrer' }, t.name || 'Untitled');
    } else {
      nameContent = txt(t.name || 'Untitled');
    }

    const nameEl = el('div', { class: 'task-name' + (done ? ' strikethrough' : '') }, nameContent);
    const meta   = el('div', { class: 'task-meta' });

    meta.appendChild(el('span', { class: 'badge ' + priorityCls(t.priority) }, t.priority || 'normal'));
    meta.appendChild(el('span', { class: 'badge ' + statusCls(t.status) }, t.status || 'todo'));

    if (t.due_date) {
      const dueEl = el('span', {
        class: 'task-due' + (isOverdue(t.due_date) && !done ? ' overdue' : '')
      }, fmtDate(t.due_date));
      meta.appendChild(dueEl);
    }
    if (t.list) {
      meta.appendChild(el('span', { class: 'task-list-tag' }, '· ' + t.list));
    }

    list.appendChild(el('div', { class: 'task-item' }, checkDiv, el('div', { class: 'task-body' }, nameEl, meta)));
  }
}

function filterTasks(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTasks(allTasks);
}

// ── Render: Emails ────────────────────────────────────────────────────────
function renderEmails(emails) {
  document.getElementById('email-count').textContent = emails.length;
  const container = document.getElementById('email-groups');
  container.innerHTML = '';

  if (!emails.length) {
    container.appendChild(el('div', { class: 'empty' }, 'No emails'));
    return;
  }

  // Group by category
  const ORDER = ['Finance', 'High Priority', 'Updates'];
  const groups = {};
  for (const e of emails) {
    const cat = e.category || 'Other';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(e);
  }

  const sortedKeys = [
    ...ORDER.filter(k => groups[k]),
    ...Object.keys(groups).filter(k => !ORDER.includes(k))
  ];

  const grid = el('div', { class: 'email-grid' });

  for (const cat of sortedKeys) {
    const col = document.createElement('div');

    // Group label
    const labelRow = el('div', { class: 'email-group-label' },
      el('span', { class: 'badge ' + categoryCls(cat) }, cat),
      el('span', { class: 'line' })
    );
    col.appendChild(labelRow);

    const emailList = el('div', { class: 'email-list' });

    for (const em of groups[cat]) {
      const labels = em.labels
        ? (typeof em.labels === 'string' ? em.labels.split(',') : Array.isArray(em.labels) ? em.labels : [])
        : [];

      const avatar = el('div', { class: 'email-avatar' }, initials(em.from));

      const fromRow = el('div', { class: 'email-from-row' },
        el('div', { class: 'email-from' }, em.from || 'Unknown'),
        el('div', { class: 'email-date' }, fmtDateTime(em.date))
      );
      const subjectEl  = el('div', { class: 'email-subject' }, em.subject || '(no subject)');
      const snippetEl  = em.snippet ? el('div', { class: 'email-snippet' }, em.snippet) : null;
      const labelsEl   = labels.length
        ? el('div', { class: 'email-labels' },
            ...labels.map(l => el('span', { class: 'email-label' }, l.trim()))
          )
        : null;

      const body = el('div', { class: 'email-body' }, fromRow, subjectEl, snippetEl, labelsEl);
      const item = el('div', { class: 'email-item' + (em.unread ? ' unread' : '') }, avatar, body);
      emailList.appendChild(item);
    }

    col.appendChild(emailList);
    grid.appendChild(col);
  }

  container.appendChild(grid);
}

// ── Countdown ──────────────────────────────────────────────────────────────
setInterval(() => {
  const left = Math.max(0, Math.round((nextRefreshTime - Date.now()) / 1000));
  const m = String(Math.floor(left / 60)).padStart(2, '0');
  const s = String(left % 60).padStart(2, '0');
  const el = document.getElementById('next-refresh');
  if (el) el.textContent = 'Refresh in ' + m + ':' + s;
}, 1000);

// ── Auto-refresh every 5 minutes ──────────────────────────────────────────
setInterval(fetchAll, 300_000);

// ── Boot ───────────────────────────────────────────────────────────────────
fetchAll();
</script>
</body>
